name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimum-xcode:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Verify minimum Xcode 16.0
        shell: bash
        run: |
          test -d "$DEVELOPER_DIR"
          /usr/bin/xcodebuild -version
          actual_xcode=$(/usr/bin/xcodebuild -version | sed -n 's/^Xcode //p')
          test "$actual_xcode" = "16.0" || {
            echo "expected Xcode 16.0 at $DEVELOPER_DIR, found $actual_xcode" >&2
            echo "if the runner image dropped Xcode 16.0, bump the package minimum deliberately" >&2
            exit 1
          }
          /usr/bin/xcrun --find swift
      - name: Test Debug and Release on macOS
        shell: bash
        run: |
          swift test \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
          swift test -c release \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
      - name: Build every supported platform in Release
        shell: bash
        run: |
          for destination in \
            'generic/platform=iOS Simulator' \
            'platform=macOS,variant=Mac Catalyst' \
            'generic/platform=tvOS Simulator' \
            'generic/platform=visionOS Simulator' \
            'generic/platform=watchOS Simulator'; do
            /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
              -destination "$destination" \
              SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          done

  newest-stable:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Select newest stable Xcode
        shell: bash
        run: |
          newest=$(basename -a /Applications/Xcode_*.app \
            | grep -E '^Xcode_[0-9]+([.][0-9]+)*[.]app$' \
            | sort -V | tail -1)
          test -n "$newest"
          developer_dir="$(readlink -f "/Applications/$newest")/Contents/Developer"
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version
      - name: Test Debug and Release on macOS
        shell: bash
        run: |
          swift test \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
          swift test -c release \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
      - name: Run the supported platform runtime matrix
        shell: bash
        run: |
          result_dir="$(mktemp -d /tmp/adaptiveglyphkit-platform-results.XXXXXX)"
          bash Scripts/test-platform-matrix.sh "$result_dir"

  watchos:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Select newest stable Xcode
        shell: bash
        run: |
          newest=$(basename -a /Applications/Xcode_*.app \
            | grep -E '^Xcode_[0-9]+([.][0-9]+)*[.]app$' \
            | sort -V | tail -1)
          test -n "$newest"
          developer_dir="$(readlink -f "/Applications/$newest")/Contents/Developer"
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version
      - name: Run the complete suite on the newest available watchOS runtime
        shell: bash
        run: |
          runtime=$(/usr/bin/xcrun simctl list runtimes available -j | jq -r '
            [.runtimes[]
              | select(.isAvailable == true)
              | select(.identifier | contains("watchOS"))]
            | sort_by(.version | split(".") | map(tonumber))
            | (last // {})
            | .identifier // empty')
          test -n "$runtime"
          udid="$(bash Scripts/select-watch-simulator.sh "$runtime")"
          test -n "$udid"
          /usr/bin/xcodebuild test \
            -scheme AdaptiveGlyphKit \
            -configuration Debug \
            -destination "platform=watchOS Simulator,id=$udid" \
            SWIFT_STRICT_CONCURRENCY=complete \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
      - name: Prove the watchOS compile-time API surface
        shell: bash
        run: bash Scripts/test-watchos-api-surface.sh

  fixture-provenance:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Verify fixture provenance
        shell: bash
        run: |
          test -d "$DEVELOPER_DIR"
          bash Scripts/verify-fixture-provenance.sh
          swift test --filter FixtureProvenanceTests \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
