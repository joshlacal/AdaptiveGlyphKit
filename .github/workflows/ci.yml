name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['*.*.*']

permissions:
  contents: read

jobs:
  minimum-xcode:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify exact minimum Xcode and Swift
        shell: bash
        run: &minimum-setup |
          expected_xcode=16.0
          expected_build=16A242d
          developer_dir="$DEVELOPER_DIR"
          : "minimum developer directory selected"
          test "$developer_dir" = /Applications/Xcode_16.0.app/Contents/Developer || exit 1
          test -d "$developer_dir" || exit 1
          actual_xcode=$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version | sed -n 's/^Xcode //p')
          actual_build=$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version | sed -n 's/^Build version //p')
          test "$actual_xcode" = "$expected_xcode" || exit 1
          test "$actual_build" = "$expected_build" || exit 1
          toolchain_bin="$developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin"
          swift_bin="$toolchain_bin/swift"
          test -x "$swift_bin" || exit 1
          test "$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcrun --find swift)" = "$swift_bin" || exit 1
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          echo "SWIFT_BIN=$swift_bin" >> "$GITHUB_ENV"
          echo "$toolchain_bin" >> "$GITHUB_PATH"
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version
          "$swift_bin" --version
      - name: Test Debug and Release on macOS
        shell: bash
        run: |
          : "${SWIFT_BIN:?verified Swift binary was not persisted}"
          "$SWIFT_BIN" test \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
          "$SWIFT_BIN" test -c release \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
      - name: Build all encoding-capable and watchOS surfaces in Release
        shell: bash
        run: |
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=tvOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=visionOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=watchOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

  newest-stable:
    runs-on: macos-15 # PLAN5_NEWEST_STABLE_RUNNER
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify sealed newest-stable Xcode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: &newest-setup |
          config=.release/toolchains.json
          jq -e '.newestStable.selection == "official-runner-inventory"' "$config" >/dev/null
          expected_xcode=$(jq -r '.newestStable.xcode' "$config")
          expected_build=$(jq -r '.newestStable.build' "$config")
          developer_dir=$(jq -r '.newestStable.developerDir' "$config")
          expected_runner=$(jq -r '.newestStable.runnerImage' "$config")
          expected_architecture=$(jq -r '.newestStable.architecture' "$config")
          expected_image_version=$(jq -r '.newestStable.runnerImageVersion' "$config")
          inventory_path=$(jq -r '.newestStable.inventoryPath' "$config")
          expected_blob=$(jq -r '.newestStable.inventoryBlobSHA' "$config")
          expected_inventory_sha256=$(jq -r '.newestStable.inventorySHA256' "$config")
          if rg -i 'beta|release candidate|(^|[^a-z])rc([^a-z]|$)|preview|seed' \
            <<<"$expected_xcode $developer_dir"; then
            echo "sealed newest-stable toolchain is prerelease" >&2
            exit 1
          fi
          test "macos-$(sw_vers -productVersion | cut -d. -f1)" = "$expected_runner" || exit 1
          test "$(uname -m)" = "$expected_architecture" || exit 1
          test "${ImageVersion:?GitHub runner did not expose ImageVersion}" = "$expected_image_version" || exit 1
          inventory_metadata=$(gh api "repos/actions/runner-images/contents/$inventory_path")
          live_blob=$(jq -r .sha <<<"$inventory_metadata")
          if [[ $live_blob != "$expected_blob" ]]; then
            echo "official runner inventory changed; rediscover, resynchronize, reseal, and reapprove" >&2
            exit 1
          fi
          live_content_sha256=$(jq -r .content <<<"$inventory_metadata" | tr -d '\n' \
            | base64 --decode | shasum -a 256 | awk '{print $1}')
          test "$live_content_sha256" = "$expected_inventory_sha256" || exit 1
          test -d "$developer_dir" || exit 1
          actual_xcode=$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version | sed -n 's/^Xcode //p')
          actual_build=$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version | sed -n 's/^Build version //p')
          test "$actual_xcode" = "$expected_xcode" || exit 1
          test "$actual_build" = "$expected_build" || exit 1
          toolchain_bin="$developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin"
          swift_bin="$toolchain_bin/swift"
          test -x "$swift_bin" || exit 1
          test "$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcrun --find swift)" = "$swift_bin" || exit 1
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          echo "SWIFT_BIN=$swift_bin" >> "$GITHUB_ENV"
          echo "$toolchain_bin" >> "$GITHUB_PATH"
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version
          "$swift_bin" --version
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcrun simctl list runtimes
          {
            echo "runner=$expected_runner"
            echo "runner_image_version=$expected_image_version"
            echo "architecture=$expected_architecture"
            echo "xcode=$expected_xcode"
            echo "xcode_build=$expected_build"
            echo "developer_dir=$developer_dir"
            echo "inventory_blob_sha=$expected_blob"
            echo "inventory_content_sha256=$expected_inventory_sha256"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Test macOS and the sealed iOS runtime
        shell: bash
        run: |
          : "${SWIFT_BIN:?sealed Swift binary was not persisted}"
          "$SWIFT_BIN" test \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
          "$SWIFT_BIN" test -c release \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
          ios_version=$(jq -r '.newestStable.iOS' .release/toolchains.json)
          [[ "$ios_version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]] || exit 1
          ios_runtime="com.apple.CoreSimulator.SimRuntime.iOS-${ios_version//./-}"
          runtime_json=$(/usr/bin/xcrun simctl list runtimes available -j)
          jq -e --arg id "$ios_runtime" \
            'any(.runtimes[]; .identifier == $id and .isAvailable)' \
            >/dev/null <<<"$runtime_json"
          highest_ios_runtime=$(jq -r '
            [.runtimes[]
              | select(.isAvailable == true)
              | select(.identifier | contains("iOS"))]
            | sort_by(.version | split(".") | map(tonumber))
            | (last // {})
            | .identifier // empty
          ' <<<"$runtime_json")
          if [[ "$highest_ios_runtime" != "$ios_runtime" ]]; then
            echo "highest available iOS runtime differs from the sealed runtime" >&2
            exit 1
          fi
          ios_udid=$(bash Scripts/select-platform-simulator.sh "$ios_runtime" iPhone)
          test -n "$ios_udid"
          /usr/bin/xcodebuild test \
            -scheme AdaptiveGlyphKit \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$ios_udid" \
            SWIFT_STRICT_CONCURRENCY=complete \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

  watchos-minimum:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify exact minimum Xcode and Swift
        shell: bash
        run: *minimum-setup
      - name: Require watchOS 11 and run the complete watch suite
        shell: bash
        run: |
          : "${SWIFT_BIN:?verified Swift binary was not persisted}"
          "$SWIFT_BIN" package describe
          /usr/bin/xcodebuild -downloadPlatform watchOS -buildVersion 11.0
          /usr/bin/xcrun simctl list runtimes | grep -F 'watchOS 11.0'
          WATCH_RUNTIME_ID=com.apple.CoreSimulator.SimRuntime.watchOS-11-0
          WATCH_UDID="$(bash Scripts/select-watch-simulator.sh "$WATCH_RUNTIME_ID")"
          test -n "$WATCH_UDID"
          /usr/bin/xcodebuild test \
            -scheme AdaptiveGlyphKit \
            -configuration Debug \
            -destination "platform=watchOS Simulator,id=$WATCH_UDID" \
            SWIFT_STRICT_CONCURRENCY=complete \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

  watchos-stable:
    runs-on: macos-15 # PLAN5_NEWEST_STABLE_RUNNER
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify sealed newest-stable Xcode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: *newest-setup
      - name: Require the sealed watchOS runtime and run the complete watch suite
        shell: bash
        run: |
          : "${SWIFT_BIN:?sealed Swift binary was not persisted}"
          "$SWIFT_BIN" package describe
          watch_version=$(jq -r '.newestStable.watchOS' .release/toolchains.json)
          [[ "$watch_version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]] || exit 1
          WATCH_RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.watchOS-${watch_version//./-}"
          runtime_json=$(/usr/bin/xcrun simctl list runtimes available -j)
          jq -e --arg id "$WATCH_RUNTIME_ID" \
            'any(.runtimes[]; .identifier == $id and .isAvailable)' \
            >/dev/null <<<"$runtime_json"
          highest_watch_runtime=$(jq -r '
            [.runtimes[]
              | select(.isAvailable == true)
              | select(.identifier | contains("watchOS"))]
            | sort_by(.version | split(".") | map(tonumber))
            | (last // {})
            | .identifier // empty
          ' <<<"$runtime_json")
          if [[ "$highest_watch_runtime" != "$WATCH_RUNTIME_ID" ]]; then
            echo "highest available watchOS runtime differs from the sealed runtime" >&2
            exit 1
          fi
          WATCH_UDID="$(bash Scripts/select-watch-simulator.sh "$WATCH_RUNTIME_ID")"
          test -n "$WATCH_UDID"
          /usr/bin/xcodebuild test \
            -scheme AdaptiveGlyphKit \
            -configuration Debug \
            -destination "platform=watchOS Simulator,id=$WATCH_UDID" \
            SWIFT_STRICT_CONCURRENCY=complete \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

  api-surface:
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: minimum
            runner: macos-15
            developer_dir: /Applications/Xcode_16.0.app/Contents/Developer
          - lane: newest-stable
            runner: macos-15 # PLAN5_NEWEST_STABLE_RUNNER
            developer_dir: ''
    runs-on: ${{ matrix.runner }}
    env:
      DEVELOPER_DIR: ${{ matrix.developer_dir }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify selected Xcode and Swift
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ matrix.lane }}" == minimum ]]; then
            expected_xcode=16.0
            expected_build=16A242d
            developer_dir="$DEVELOPER_DIR"
            : "minimum developer directory selected"
            test "$developer_dir" = /Applications/Xcode_16.0.app/Contents/Developer || exit 1
          else
            config=.release/toolchains.json
            jq -e '.newestStable.selection == "official-runner-inventory"' "$config" >/dev/null
            expected_xcode=$(jq -r '.newestStable.xcode' "$config")
            expected_build=$(jq -r '.newestStable.build' "$config")
            developer_dir=$(jq -r '.newestStable.developerDir' "$config")
            expected_runner=$(jq -r '.newestStable.runnerImage' "$config")
            expected_architecture=$(jq -r '.newestStable.architecture' "$config")
            expected_image_version=$(jq -r '.newestStable.runnerImageVersion' "$config")
            inventory_path=$(jq -r '.newestStable.inventoryPath' "$config")
            expected_blob=$(jq -r '.newestStable.inventoryBlobSHA' "$config")
            expected_inventory_sha256=$(jq -r '.newestStable.inventorySHA256' "$config")
            if rg -i 'beta|release candidate|(^|[^a-z])rc([^a-z]|$)|preview|seed' \
              <<<"$expected_xcode $developer_dir"; then
              echo "sealed newest-stable toolchain is prerelease" >&2
              exit 1
            fi
            test "macos-$(sw_vers -productVersion | cut -d. -f1)" = "$expected_runner" || exit 1
            test "$(uname -m)" = "$expected_architecture" || exit 1
            test "${ImageVersion:?GitHub runner did not expose ImageVersion}" = "$expected_image_version" || exit 1
            inventory_metadata=$(gh api "repos/actions/runner-images/contents/$inventory_path")
            live_blob=$(jq -r .sha <<<"$inventory_metadata")
            if [[ $live_blob != "$expected_blob" ]]; then
              echo "official runner inventory changed; rediscover, resynchronize, reseal, and reapprove" >&2
              exit 1
            fi
            live_content_sha256=$(jq -r .content <<<"$inventory_metadata" | tr -d '\n' \
              | base64 --decode | shasum -a 256 | awk '{print $1}')
            test "$live_content_sha256" = "$expected_inventory_sha256" || exit 1
          fi
          test -d "$developer_dir" || exit 1
          actual_xcode=$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version | sed -n 's/^Xcode //p')
          actual_build=$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version | sed -n 's/^Build version //p')
          test "$actual_xcode" = "$expected_xcode" || exit 1
          test "$actual_build" = "$expected_build" || exit 1
          toolchain_bin="$developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin"
          swift_bin="$toolchain_bin/swift"
          test -x "$swift_bin" || exit 1
          test "$(DEVELOPER_DIR="$developer_dir" /usr/bin/xcrun --find swift)" = "$swift_bin" || exit 1
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          echo "SWIFT_BIN=$swift_bin" >> "$GITHUB_ENV"
          echo "$toolchain_bin" >> "$GITHUB_PATH"
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcodebuild -version
          "$swift_bin" --version
          DEVELOPER_DIR="$developer_dir" /usr/bin/xcrun simctl list runtimes
          if [[ "${{ matrix.lane }}" == newest-stable ]]; then
            {
              echo "runner=$expected_runner"
              echo "runner_image_version=$expected_image_version"
              echo "architecture=$expected_architecture"
              echo "xcode=$expected_xcode"
              echo "xcode_build=$expected_build"
              echo "developer_dir=$developer_dir"
              echo "inventory_blob_sha=$expected_blob"
              echo "inventory_content_sha256=$expected_inventory_sha256"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Prove the watchOS compile-time API surface
        shell: bash
        run: |
          : "${SWIFT_BIN:?verified Swift binary was not persisted}"
          "$SWIFT_BIN" package describe
          bash Scripts/test-watchos-api-surface.sh

  platform-runtime:
    runs-on: macos-15 # PLAN5_NEWEST_STABLE_RUNNER
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify sealed newest-stable Xcode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: *newest-setup
      - name: Run all supported platform runtimes
        shell: bash
        run: |
          : "${SWIFT_BIN:?sealed Swift binary was not persisted}"
          "$SWIFT_BIN" package describe
          runtime_json=$(/usr/bin/xcrun simctl list runtimes available -j)
          for pair in iOS:iOS tvOS:tvOS visionOS:xrOS; do
            key=${pair%%:*}
            marker=${pair##*:}
            version=$(jq -r ".newestStable.$key" .release/toolchains.json)
            [[ "$version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]] || exit 1
            runtime="com.apple.CoreSimulator.SimRuntime.$marker-${version//./-}"
            jq -e --arg id "$runtime" \
              'any(.runtimes[]; .identifier == $id and .isAvailable)' \
              >/dev/null <<<"$runtime_json"
            highest_runtime=$(jq -r --arg marker "$marker" '
              [.runtimes[]
                | select(.isAvailable == true)
                | select(.identifier | contains($marker))]
              | sort_by(.version | split(".") | map(tonumber))
              | (last // {})
              | .identifier // empty
            ' <<<"$runtime_json")
            if [[ "$highest_runtime" != "$runtime" ]]; then
              echo "highest available $key runtime differs from the sealed runtime" >&2
              exit 1
            fi
          done
          export RELEASE_TOOLCHAIN_LANE=newest-stable
          export RELEASE_EVIDENCE_LABEL=hosted-newest-stable
          export RELEASE_EVIDENCE_CLASS=stable-release
          export RELEASE_SWIFT="$SWIFT_BIN"
          result_dir="$(mktemp -d /tmp/adaptiveglyphkit-platform-results.XXXXXX)"
          bash Scripts/test-platform-matrix.sh "$result_dir"

  release:
    runs-on: macos-15 # PLAN5_NEWEST_STABLE_RUNNER
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify sealed newest-stable Xcode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: *newest-setup
      - name: Test and build the release configuration
        shell: bash
        run: |
          : "${SWIFT_BIN:?sealed Swift binary was not persisted}"
          "$SWIFT_BIN" test -c release \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=tvOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=visionOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
          /usr/bin/xcodebuild build -scheme AdaptiveGlyphKit -configuration Release \
            -destination 'generic/platform=watchOS Simulator' \
            SWIFT_STRICT_CONCURRENCY=complete SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

  fixture-provenance:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify exact minimum Xcode and Swift
        shell: bash
        run: *minimum-setup
      - name: Verify fixture provenance
        shell: bash
        run: |
          : "${SWIFT_BIN:?verified Swift binary was not persisted}"
          "$SWIFT_BIN" package describe
          bash Scripts/verify-fixture-provenance.sh
          "$SWIFT_BIN" test --filter FixtureProvenanceTests \
            -Xswiftc -strict-concurrency=complete \
            -Xswiftc -warnings-as-errors

  tagged-clean-consumer:
    runs-on: macos-15
    needs:
      - minimum-xcode
      - newest-stable
      - watchos-minimum
      - watchos-stable
      - api-surface
      - platform-runtime
      - release
      - fixture-provenance
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
      ADAPTIVE_GLYPHKIT_URL: https://github.com/${{ github.repository }}.git
      ADAPTIVE_GLYPHKIT_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate bare semantic-version tag
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
      - name: Verify exact minimum Xcode and Swift
        shell: bash
        run: *minimum-setup
      - name: Resolve and build from the public immutable tag
        shell: bash
        run: |
          : "${SWIFT_BIN:?verified Swift binary was not persisted}"
          "$SWIFT_BIN" package describe
          bash Scripts/test-clean-consumer.sh
